version: '3.8'

services:

  # ─── PostgreSQL ───────────────────────────────────────────────────
  db_zea:
    image: postgres:14
    container_name: postgres_db_zea
    env_file:
      - ../.env
    ports:
      - "5433:5432"          # локальный доступ: localhost:5433
    volumes:
      - postgres_data_zea:/var/lib/postgresql/data
    networks:
      - zea_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Django (dev) ─────────────────────────────────────────────────
  web_zea:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: django_web_zea
    entrypoint: /entrypoint.sh
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ../app:/app
      - ../app/static:/app/static
      - ../app/media:/app/media
    env_file:
      - ../.env
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings.dev
      # Перекрываем .env для связи внутри Docker-сети
      - POSTGRES_HOST=db_zea
      - POSTGRES_PORT=5432
    depends_on:
      db_zea:
        condition: service_healthy
    ports:
      - "8085:8000"          # http://localhost:8085
    networks:
      - zea_network

networks:
  zea_network:
    driver: bridge

volumes:
  postgres_data_zea:
