{% load static i18n %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE|default:'ru' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, follow">
    <title>404 — {% trans "Страница не найдена" %}</title>
    {% if settings.favicon %}<link rel="icon" type="image/webp" href="{{ settings.favicon.url }}">{% endif %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            min-height:100vh; display:flex; align-items:center; justify-content:center;
            background:#0B0F19; font-family:'Inter',system-ui,sans-serif; color:#fff;
            overflow:hidden; position:relative; padding:24px;
            background-image:
                radial-gradient(ellipse at 20% 30%, rgba(99,102,241,.14) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 70%, rgba(139,92,246,.10) 0%, transparent 55%);
        }
        .grid {
            position:absolute; inset:0; pointer-events:none;
            background-image:
                linear-gradient(rgba(99,102,241,.04) 1px,transparent 1px),
                linear-gradient(90deg,rgba(99,102,241,.04) 1px,transparent 1px);
            background-size:60px 60px;
        }
        .wrap { position:relative; z-index:1; text-align:center; max-width:560px; }
        .code {
            font-size:clamp(96px,22vw,200px); font-weight:900; line-height:1;
            background:linear-gradient(135deg,#818cf8,#a78bfa,#22d3ee);
            -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
            text-shadow:0 0 80px rgba(129,140,248,.3); margin-bottom:8px;
        }
        h1 { font-size:clamp(22px,5vw,30px); font-weight:800; margin-bottom:14px; }
        p { color:#94a3b8; font-size:16px; line-height:1.6; margin-bottom:32px; }
        .btn {
            display:inline-flex; align-items:center; gap:8px;
            background:linear-gradient(135deg,#6366f1,#8b5cf6); color:#fff;
            text-decoration:none; font-weight:600; font-size:15px;
            padding:14px 28px; border-radius:14px;
            box-shadow:0 8px 30px rgba(99,102,241,.4); transition:transform .2s, box-shadow .2s;
        }
        .btn:hover { transform:translateY(-2px); box-shadow:0 12px 40px rgba(99,102,241,.55); }
        .arrow { font-size:18px; }
    </style>
</head>
<body>
    <div class="grid"></div>
    <div class="wrap">
        <div class="code">404</div>
        <h1>{% trans "Страница не найдена" %}</h1>
        <p>{% trans "Возможно, ссылка устарела или страница была перемещена. Вернитесь на главную — там всё на месте." %}</p>
        <a href="/" class="btn">{% trans "На главную" %} <span class="arrow">→</span></a>
    </div>
</body>
</html>
